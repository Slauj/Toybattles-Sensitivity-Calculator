<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toybattles Sensitivity Calculator</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #111115; color: #f1f2f6; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: #1a1a24; padding: 30px; border-radius: 16px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); width: 440px; border: 1px solid #2a2a3a;
        }
        h2 { margin-top: 0; color: #ff4757; text-align: center; font-size: 24px; letter-spacing: 0.5px; margin-bottom: 25px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #a4b0be; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #3a3a4a; background: #111115; 
            color: #fff; border-radius: 8px; font-size: 16px; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #ff4757; }
        .result-box { margin-top: 25px; border-top: 2px solid #2a2a3a; padding-top: 20px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; align-items: center; }
        .res-row:last-child { margin-bottom: 0; }
        .label-text { color: #ced6e0; font-weight: 500; }
        .val { 
            font-weight: 700; color: #2ed573; font-size: 16px;
            background: rgba(46, 213, 115, 0.1); padding: 4px 12px; border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Toybattles Sensitivity Calculator</h2>
    <div class="group">
        <label>Mouse DPI</label>
        <input type="number" id="dpi" value="800" step="50" oninput="calculate()">
    </div>
    <div class="group">
        <label>In-game Sensitivity Slider</label>
        <input type="number" id="sens" value="12" min="1" max="100" step="1" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="res-row">
            <span class="label-text">Hipfire:</span>
            <span class="val" id="hipfire">-</span>
        </div>
        <div class="res-row">
            <span class="label-text">Rifle Zoom:</span>
            <span class="val" id="rifle">-</span>
        </div>
        <div class="res-row">
            <span class="label-text">Sniper Zoom 1:</span>
            <span class="val" id="scoped1">-</span>
        </div>
        <div class="res-row">
            <span class="label-text">Sniper Zoom 2:</span>
            <span class="val" id="scoped2">-</span>
        </div>
    </div>
</div>

<script>
function calculate() {
    const dpi = parseFloat(document.getElementById('dpi').value);
    let sens = parseInt(document.getElementById('sens').value, 10);
    
    if (isNaN(dpi) || isNaN(sens) || dpi <= 0 || sens <= 0) {
        document.getElementById('hipfire').innerText = "-";
        document.getElementById('rifle').innerText = "-";
        document.getElementById('scoped1').innerText = "-";
        document.getElementById('scoped2').innerText = "-";
        return;
    }

    // Exact master binary counts for 1 full revolution at sensitivity = 1
    const hipMasterCounts = 139600;
    const rifleMasterCounts = 136400;
    const scope1MasterCounts = 1598000;
    const scope2MasterCounts = 1793000;

    // Direct slider scalar division tracking 
    const activeHipCounts = hipMasterCounts / sens;
    const activeRifleCounts = rifleMasterCounts / sens;
    const activeScope1Counts = scope1MasterCounts / sens;
    const activeScope2Counts = scope2MasterCounts / sens;

    // Conversion equation translating counts back to clean physical centimeters
    const hipCm = activeHipCounts / (dpi / 2.54);
    const rifleCm = activeRifleCounts / (dpi / 2.54);
    const scope1Cm = activeScope1Counts / (dpi / 2.54);
    const scope2Cm = activeScope2Counts / (dpi / 2.54);

    document.getElementById('hipfire').innerText = hipCm.toFixed(2) + " cm";
    document.getElementById('rifle').innerText = rifleCm.toFixed(2) + " cm";
    document.getElementById('scoped1').innerText = scope1Cm.toFixed(2) + " cm";
    document.getElementById('scoped2').innerText = scope2Cm.toFixed(2) + " cm";
}
calculate();
</script>

</body>
</html>
